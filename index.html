<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rajat Kulshreshtha</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 560px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 2rem;
      color: white;
      font-weight: 700;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-radius: 12px;
      text-decoration: none;
      color: #1e293b;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      border: 1px solid #e2e8f0;
      background: #fafbfc;
    }

    .link-btn:hover {
      border-color: #c7d2fe;
      background: #eef2ff;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.1);
    }

    .link-btn .icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .icon-cv { background: #dbeafe; }
    .icon-travel { background: #ede9fe; }

    .link-btn .label {
      text-align: left;
    }

    .link-btn .label .title {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      color: #1e293b;
    }

    .link-btn .label .desc {
      display: block;
      font-weight: 400;
      font-size: 0.82rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    .arrow {
      margin-left: auto;
      color: #cbd5e1;
      font-size: 1.1rem;
      transition: transform 0.2s;
    }

    .link-btn:hover .arrow {
      transform: translateX(3px);
      color: #6366f1;
    }

    footer {
      margin-top: 32px;
      color: #94a3b8;
      font-size: 0.78rem;
    }

    /* Password modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
      text-align: center;
    }
    .modal .modal-icon {
      width: 52px;
      height: 52px;
      background: #ede9fe;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
    }
    .modal h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .modal p {
      color: #64748b;
      font-size: 0.88rem;
      margin-bottom: 22px;
    }
    .modal input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal input[type="password"]:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }
    .modal input[type="password"].error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }
    .modal .error-msg {
      color: #ef4444;
      font-size: 0.82rem;
      margin-top: 8px;
      display: none;
    }
    .modal .error-msg.visible { display: block; }
    .modal .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal .btn {
      flex: 1;
      padding: 11px 16px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal .btn-cancel {
      background: #f1f5f9;
      color: #64748b;
    }
    .modal .btn-cancel:hover { background: #e2e8f0; }
    .modal .btn-submit {
      background: #7c3aed;
      color: white;
    }
    .modal .btn-submit:hover { background: #6d28d9; }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      .modal { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="avatar">RK</div>
    <h1>Rajat Kulshreshtha</h1>
    <p class="subtitle">Bangalore, India</p>

    <div class="links">

      <!-- CV Link - opens PDF directly in browser -->
      <a href="RajatK_2024_CV_9Nov-r.pdf" target="_blank" class="link-btn">
        <div class="icon icon-cv">
          <svg width="20" height="20" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <span class="label">
          <span class="title">View CV</span>
          <span class="desc">Latest resume &mdash; 2024</span>
        </span>
        <span class="arrow">&rsaquo;</span>
      </a>

      <!-- Travel Guide - password protected -->
      <a href="#" onclick="openPasswordModal(); return false;" class="link-btn" id="travel-btn">
        <div class="icon icon-travel">
          <svg width="20" height="20" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <span class="label">
          <span class="title">Travel Plans</span>
          <span class="desc">Rajat &amp; Anuya &mdash; CliftonStrengths travel guide</span>
        </span>
        <svg class="arrow" width="16" height="16" fill="none" stroke="#cbd5e1" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </a>

    </div>
  </div>

  <!-- Password Modal -->
  <div class="modal-overlay" id="passwordModal">
    <div class="modal">
      <div class="modal-icon">
        <svg width="24" height="24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h2>Password Required</h2>
      <p>Enter the password to view the travel guide</p>
      <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off" />
      <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closePasswordModal()">Cancel</button>
        <button class="btn btn-submit" id="submitBtn" onclick="checkPassword()">Unlock</button>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 Rajat Kulshreshtha
  </footer>

  <script>
    // SHA-256 hash of the password (password itself is NOT stored)
    const HASH = '0da1b9f02088a5c2599f4a15c31c43a5e9af3e504101db2eea05a1fbfe54b895';

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function openPasswordModal() {
      document.getElementById('passwordModal').classList.add('active');
      const input = document.getElementById('passwordInput');
      input.value = '';
      input.classList.remove('error');
      document.getElementById('errorMsg').classList.remove('visible');
      setTimeout(() => input.focus(), 100);
    }

    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('active');
    }

    async function checkPassword() {
      const input = document.getElementById('passwordInput');
      const password = input.value;
      if (!password) { input.focus(); return; }

      const hash = await sha256(password);

      if (hash === HASH) {
        closePasswordModal();
        window.open('Rajat-Anuya-Travel-Guide.html', '_blank');
      } else {
        input.classList.add('error');
        document.getElementById('errorMsg').classList.add('visible');
        input.value = '';
        input.focus();
      }
    }

    // Allow Enter key to submit
    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
      // Clear error state when typing
      this.classList.remove('error');
      document.getElementById('errorMsg').classList.remove('visible');
    });

    // Close modal on overlay click
    document.getElementById('passwordModal').addEventListener('click', function(e) {
      if (e.target === this) closePasswordModal();
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closePasswordModal();
    });
  </script>

</body>
</html>
