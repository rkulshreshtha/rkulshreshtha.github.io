<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rajat Kulshreshtha</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 560px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 2rem;
      color: white;
      font-weight: 700;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-radius: 12px;
      text-decoration: none;
      color: #1e293b;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      border: 1px solid #e2e8f0;
      background: #fafbfc;
    }

    .link-btn:hover {
      border-color: #c7d2fe;
      background: #eef2ff;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.1);
    }

    .link-btn .icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .icon-cv { background: #dbeafe; }
    .icon-travel { background: #ede9fe; }

    .link-btn .label {
      text-align: left;
    }

    .link-btn .label .title {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      color: #1e293b;
    }

    .link-btn .label .desc {
      display: block;
      font-weight: 400;
      font-size: 0.82rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    .arrow {
      margin-left: auto;
      color: #cbd5e1;
      font-size: 1.1rem;
      transition: transform 0.2s;
    }

    .link-btn:hover .arrow {
      transform: translateX(3px);
      color: #6366f1;
    }

    footer {
      margin-top: 32px;
      color: #94a3b8;
      font-size: 0.78rem;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="avatar">RK</div>
    <h1>Rajat Kulshreshtha</h1>
    <p class="subtitle">Bangalore, India</p>

    <div class="links">

      <!-- CV Link - opens PDF directly in browser -->
      <a href="RajatK_2024_CV_9Nov-r.pdf" target="_blank" class="link-btn">
        <div class="icon icon-cv">
          <svg width="20" height="20" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <span class="label">
          <span class="title">View CV</span>
          <span class="desc">Latest resume &mdash; 2024</span>
        </span>
        <span class="arrow">&rsaquo;</span>
      </a>

      <!-- Travel Guide - links to the rendered GitHub Pages HTML -->
      <a href="Rajat-Anuya-Travel-Guide.html" target="_blank" class="link-btn">
        <div class="icon icon-travel">
          <svg width="20" height="20" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <span class="label">
          <span class="title">Travel Plans</span>
          <span class="desc">Rajat &amp; Anuya &mdash; CliftonStrengths travel guide</span>
        </span>
        <span class="arrow">&rsaquo;</span>
      </a>

    </div>
  </div>

  <footer>
    &copy; 2026 Rajat Kulshreshtha
  </footer>

</body>
</html>
